  <style>
    :root {
      --bg: #eef3f7;
      --bg-deep: #dfe8ee;
      --text: #0f1720;
      --muted: #4f6170;
      --line: rgba(15, 23, 32, 0.12);
      --accent: #12293d;
      --accent-2: #27465e;
      --card: rgba(255, 255, 255, 0.3);
      --overlay: rgba(7, 16, 24, 0.46);
      --max: 1120px;
      --shadow: 0 18px 45px rgba(11, 24, 36, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      line-height: 1.5;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.40), rgba(255,255,255,0.18)),
        linear-gradient(135deg, #f6fafc 0%, #eaf1f5 42%, #dbe6ed 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(92%, var(--max));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(238, 243, 247, 0.82);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      gap: 1rem;
    }

    .brand {
      font-size: 1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .nav-links {
      display: flex;
      gap: 1.15rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-links a {
      font-size: 0.93rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav-links a:hover,
    .instagram-link:hover {
      color: var(--text);
    }

    .instagram-link {
      padding: 0.45rem 0.8rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      transition: 0.2s ease;
    }

    main section {
      padding: 5rem 0;
    }

    .section-header {
      margin-bottom: 1.5rem;
    }

    .section-header h1 {
      margin: 0 0 0.4rem;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    .section-header p {
      margin: 0;
      color: var(--muted);
      max-width: 42rem;
    }

    .pdf-frame {
      width: 100%;
      height: 800px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      background: rgba(255,255,255,0.5);
      overflow: hidden;
    }

    .pdf-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .small-note {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 0.75rem;
    }

    .small-note a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    footer {
      padding: 1.5rem 0 3rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 900px) {
      .pdf-frame {
        height: 650px;
      }
    }

    @media (max-width: 640px) {
      .nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .pdf-frame {
        height: 500px;
      }

      main section {
        padding: 4rem 0;
      }
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CreativeWork",
    "name": "The Highlight Reel",
    "url": "https://anchorawayphoto.com/highlight.html",
    "image": "https://anchorawayphoto.com/images/hero-web.jpg",
    "description": "Anchor Away Photo Spring 2026 Gallery.",
    "creator": {
      "@type": "Person",
      "name": "Tim Hoheneder"
    },
    "publisher": {
      "@type": "ProfessionalService",
      "name": "Anchor Away Photography"
    }
  }
  </script>
</head>

<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="brand">Anchor Away Photography</a>
      <nav class="nav-links" aria-label="Primary">
        <a href="index.html#home">Home</a>
        <a href="index.html#portfolio">Portfolio</a>
        <a href="portraits.html">Portraits</a>
        <a href="highlight.html">Highlight Reel</a>

        <a href="index.html#book">Book A Shoot</a>
        <a class="instagram-link" href="https://instagram.com/AnchorAwayPhoto" target="_blank" rel="noopener noreferrer">Instagram</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="highlight-reel">
      <div class="container">
        <div class="section-header">
          <h1>The Highlight Reel</h1>
          <p>Anchor Away Photo Spring 2026 Gallery.</p>
        </div>

        <div class="pdf-frame">
          <iframe src="images/AnchorAway_ShortPortfolio_Spring26.pdf" title="Gallery PDF"></iframe>
        </div>

        <p class="small-note">
          Want to See The Full Gallery?
          <a href="images/AnchorAway_ShortPortfolio_Spring26.pdf" target="_blank" rel="noopener noreferrer">Open My Gallery in a New Tab</a>.
        </p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">© <span id="year"></span> Anchor Away Photography</div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
